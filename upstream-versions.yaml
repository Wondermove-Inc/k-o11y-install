      target: <YOUR_REGISTRY>/observability/k-o11y-autoinstrumentation-java:latest
      status: completed
    - source: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-dotnet:latest
      target: <YOUR_REGISTRY>/observability/k-o11y-autoinstrumentation-dotnet:latest
      status: completed
    - source: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-python:latest
      target: <YOUR_REGISTRY>/observability/k-o11y-autoinstrumentation-python:latest
      status: completed
    - source: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-nodejs:latest
      target: <YOUR_REGISTRY>/observability/k-o11y-autoinstrumentation-nodejs:latest
      status: completed
    - source: docker.io/otel/autoinstrumentation-go:v0.18.0-alpha
      target: <YOUR_REGISTRY>/observability/k-o11y-autoinstrumentation-go:v0.18.0-alpha
      status: completed
      note: "Go uses eBPF, provided from Docker Hub"

# ============================================
# cert-manager (local manifest)
# ============================================
cert_manager:
  version: "v1.16.2"
  source_url: "https://github.com/cert-manager/cert-manager/releases/download/v1.16.2/cert-manager.yaml"
  local_path: "" # removed — install from official URL above
  last_synced: "2026-02-23"
  note: "For OTel Operator webhook certificate management, included locally for air-gapped support"
  images:
    - source: quay.io/jetstack/cert-manager-controller:v1.16.2
      target: <YOUR_REGISTRY>/observability/cert-manager-controller:v1.16.2
      status: completed
      note: "Image references in manifest also updated (2026-02-23)"
    - source: quay.io/jetstack/cert-manager-cainjector:v1.16.2
      target: <YOUR_REGISTRY>/observability/cert-manager-cainjector:v1.16.2
      status: completed
    - source: quay.io/jetstack/cert-manager-webhook:v1.16.2
      target: <YOUR_REGISTRY>/observability/cert-manager-webhook:v1.16.2
      status: completed
    - source: quay.io/jetstack/cert-manager-acmesolver:v1.16.2
      target: <YOUR_REGISTRY>/observability/cert-manager-acmesolver:v1.16.2
      status: completed
      note: "ACME HTTP-01 solver, referenced via --acme-http01-solver-image arg"

