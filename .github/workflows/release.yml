name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: azure/setup-helm@v4

      - name: Build CLI binaries
        run: |
          cd cmd/k-o11y-db && CGO_ENABLED=0 go build -o ../../dist/k-o11y-db . && cd ../..
          cd cmd/k-o11y-tls && CGO_ENABLED=0 go build -o ../../dist/k-o11y-tls . && cd ../..

      - name: Package Helm charts
        run: |
          mkdir -p dist
          helm package charts/k-o11y-host -d dist/
          helm package charts/k-o11y-otel-agent -d dist/
          helm package charts/k-o11y-apm-agent -d dist/
          helm package charts/k-o11y-ksm -d dist/
          helm package charts/k-o11y-otel-operator -d dist/

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
