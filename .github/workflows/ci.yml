name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go build ./...
        working-directory: cmd/k-o11y-db

  build-tls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go build ./...
        working-directory: cmd/k-o11y-tls

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: |
          helm lint charts/k-o11y-host
          helm lint charts/k-o11y-otel-agent
          helm lint charts/k-o11y-apm-agent
          helm lint charts/k-o11y-ksm
          helm lint charts/k-o11y-otel-operator
