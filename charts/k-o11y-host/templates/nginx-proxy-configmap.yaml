{{- if .Values.o11yHub.nginxProxy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: o11y-nginx-proxy-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "signoz.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes 1;

    events {
        worker_connections 1024;
    }

    http {
        upstream o11y-core {
            server o11y-core:{{ .Values.o11yCore.service.port }};
        }

        upstream o11y-hub {
            server localhost:{{ default 8080 .Values.o11yHub.service.port }};
        }

        server {
            listen 80;

            location /api/v1/servicemap {
                proxy_pass http://o11y-core;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            location / {
                proxy_pass http://o11y-hub;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
            }
        }
    }
{{- end }}
